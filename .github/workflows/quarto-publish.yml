on:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # --- NOVOS PASSOS PARA O PYTHON ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Você pode ajustar para a versão que costuma usar

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Substitua os nomes abaixo pelas bibliotecas exatas que o seu xlsx_to_yml.py precisa:
          pip install pandas openpyxl pyyaml 
          
          # Se você tiver um arquivo requirements.txt no repositório, apague o comando de cima e use este:
          # pip install -r requirements.txt
      # ----------------------------------

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}